name: Build VK+ iOS

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version (e.g. 1.0.1)'
        required: true
        default: '1.0.0'
      notes:
        description: 'Release notes'
        required: false
        default: 'Pre-release'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild \
            -project VKPlus.xcodeproj \
            -scheme VKPlus \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ARCHS=arm64 \
            build

      - name: Ad-hoc sign
        run: |
          APP=build/Build/Products/Release-iphoneos/VKPlus.app
          # Create minimal entitlements
          cat > ent.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>application-identifier</key><string>com.selfcode.vkplus</string>
            <key>get-task-allow</key><true/>
          </dict></plist>
          EOF
          # Sign with ad-hoc identity
          codesign --force --sign "-" --entitlements ent.plist --timestamp=none "$APP/VKPlus" || true
          codesign --force --sign "-" --timestamp=none "$APP" || true

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/VKPlus.app Payload/
          zip -r VKPlus-v${{ github.event.inputs.version_name }}.ipa Payload
          rm -rf Payload build ent.plist

      - name: Publish Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version_name }}
          name: "VK+ iOS v${{ github.event.inputs.version_name }}"
          body: ${{ github.event.inputs.notes }}
          prerelease: true
          files: VKPlus-v${{ github.event.inputs.version_name }}.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
