name: Build VK+ iOS

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version (e.g. 1.0.1)'
        required: true
        default: '1.0.0'
      notes:
        description: 'Release notes'
        required: false
        default: 'Pre-release'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild \
            -project VKPlus.xcodeproj \
            -scheme VKPlus \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/VKPlus.app Payload/
          zip -r VKPlus-v${{ github.event.inputs.version_name }}.ipa Payload
          rm -rf Payload build

      - name: Publish Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version_name }}
          name: "VK+ iOS v${{ github.event.inputs.version_name }}"
          body: ${{ github.event.inputs.notes }}
          prerelease: true
          files: VKPlus-v${{ github.event.inputs.version_name }}.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
