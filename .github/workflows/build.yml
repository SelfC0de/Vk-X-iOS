name: Build VK+ iOS

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version (e.g. 1.0.1)'
        required: true
        default: '1.0.0'
      notes:
        description: 'Release notes'
        required: false
        default: 'Pre-release'

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild \
            -project VKPlus.xcodeproj \
            -scheme VKPlus \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            build

      - name: Inject icons into .app bundle
        run: |
          APP=build/Build/Products/Release-iphoneos/VKPlus.app

          # Copy all icon PNGs directly into .app root
          cp VKPlus/Assets.xcassets/AppIcon.appiconset/Icon-60@2x.png  "$APP/AppIcon60x60@2x.png"
          cp VKPlus/Assets.xcassets/AppIcon.appiconset/Icon-60@3x.png  "$APP/AppIcon60x60@3x.png"
          cp VKPlus/Assets.xcassets/AppIcon.appiconset/Icon-40@2x.png  "$APP/AppIcon40x40@2x.png"
          cp VKPlus/Assets.xcassets/AppIcon.appiconset/Icon-40@3x.png  "$APP/AppIcon40x40@3x.png"
          cp VKPlus/Assets.xcassets/AppIcon.appiconset/Icon-29@2x.png  "$APP/AppIcon29x29@2x.png"
          cp VKPlus/Assets.xcassets/AppIcon.appiconset/Icon-29@3x.png  "$APP/AppIcon29x29@3x.png"
          cp VKPlus/Assets.xcassets/AppIcon.appiconset/Icon-20@2x.png  "$APP/AppIcon20x20@2x.png"
          cp VKPlus/Assets.xcassets/AppIcon.appiconset/Icon-20@3x.png  "$APP/AppIcon20x20@3x.png"
          cp VKPlus/Assets.xcassets/AppIcon.appiconset/Icon-1024.png    "$APP/AppIcon1024x1024.png"

          # Patch Info.plist to reference the PNG icons directly
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons" "$APP/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons dict" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string AppIcon60x60" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName string AppIcon" "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:UIPrerenderedIcon bool false" "$APP/Info.plist"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/VKPlus.app Payload/
          zip -r VKPlus-v${{ github.event.inputs.version_name }}.ipa Payload
          rm -rf Payload build

      - name: Publish Pre-Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: v${{ github.event.inputs.version_name }}
          name: "VK+ iOS v${{ github.event.inputs.version_name }}"
          body: ${{ github.event.inputs.notes }}
          prerelease: true
          files: VKPlus-v${{ github.event.inputs.version_name }}.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
